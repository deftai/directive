version: '3'

tasks:
  init:
    desc: Write canonical AGENTS.md to project root (idempotent — skips if deft/main.md sentinel found)
    summary: |
      Copies the canonical AGENTS.md template from templates/agents-entry.md
      to ../AGENTS.md (the parent project root). Idempotent: if the file already
      contains the sentinel string "deft/main.md", the task is a no-op.
      Use this when cloning deft directly (without the Go installer).
    cmds:
      - |
        python3 -c "
        import os, sys
        deft_dir = os.path.dirname(os.path.dirname(os.path.abspath('{{.TASKFILE_DIR}}')))
        # When invoked via 'task agents:init', TASKFILE_DIR is tasks/
        # We need to go up to deft/ then up to the project root
        deft_root = os.path.dirname(os.path.abspath('.'))
        project_root = os.path.dirname(deft_root) if os.path.basename(deft_root) == 'deft' else os.getcwd()
        agents_path = os.path.join(project_root, 'AGENTS.md')
        template_path = os.path.join(os.path.dirname(os.path.abspath('.')), 'templates', 'agents-entry.md')
        sentinel = 'deft/main.md'
        if os.path.exists(agents_path):
            with open(agents_path, 'r', encoding='utf-8') as f:
                content = f.read()
            if sentinel in content:
                print(f'AGENTS.md already contains deft entry (sentinel found) -- skipping.')
                sys.exit(0)
            # Append to existing AGENTS.md
            with open(template_path, 'r', encoding='utf-8') as f:
                template = f.read()
            with open(agents_path, 'a', encoding='utf-8') as f:
                f.write('\n\n' + template)
            print(f'Appended deft entry to existing {agents_path}')
        else:
            with open(template_path, 'r', encoding='utf-8') as f:
                template = f.read()
            with open(agents_path, 'w', encoding='utf-8') as f:
                f.write(template)
            print(f'Created {agents_path}')
        "
