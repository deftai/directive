version: '3'

includes:
  deployments:
    taskfile: ./taskfiles/deployments.yml
    optional: true

vars:
  PROJECT_NAME: deft
  VERSION: 0.5.2

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  validate:
    desc: Validate all markdown files
    cmds:
      - uv run python -c "from pathlib import Path; files=[f for f in sorted(Path('.').rglob('*.md')) if '.git' not in f.parts and 'backup' not in f.parts]; [print(f'\u2713 {f}') for f in files]; print(f'\u2713 All {len(files)} markdown files validated')"

  test:
    desc: Run test suite
    cmds:
      - uv run pytest tests/

  test:coverage:
    desc: Run tests with coverage (fails if < 75%)
    cmds:
      - uv run pytest tests/ --cov --cov-report=html

  fmt:
    desc: Format Python code
    cmds:
      - uv run ruff format .
      - uv run black .

  lint:
    desc: Lint and type-check Python code
    cmds:
      - uv run ruff check .
      - uv run mypy run.py

  check:
    desc: Run all pre-commit checks
    deps:
      - validate
      - lint
      - test
    cmds:
      - echo "✓ All checks passed"

  build:
    desc: Package framework for distribution
    cmds:
      - cmd: mkdir -p dist
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path dist | Out-Null"
        platforms: [windows]
      - cmd: tar -czf dist/deft-{{.VERSION}}.tar.gz --exclude=backup --exclude=dist --exclude=.git --exclude=node_modules .
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Compress-Archive -Path . -DestinationPath dist\deft-{{.VERSION}}.zip -Force"
        platforms: [windows]
      - cmd: echo "✓ Created dist/deft-{{.VERSION}}.tar.gz"
        platforms: [linux, darwin]
      - cmd: echo "✓ Created dist/deft-{{.VERSION}}.zip"
        platforms: [windows]

  clean:
    desc: Clean generated artifacts
    cmds:
      - cmd: rm -rf dist/
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "if (Test-Path dist) { Remove-Item -Recurse -Force dist }"
        platforms: [windows]
      - echo "✓ Cleaned artifacts"

  install:
    desc: Install deft — runs the cross-platform install.py
    cmds:
      - cmd: python3 install.py
        platforms: [linux, darwin]
      - cmd: python.exe install.py
        platforms: [windows]

  uninstall:
    desc: Remove deft entry from AGENTS.md
    cmds:
      - uv run python -c "from pathlib import Path; f=Path('AGENTS.md'); t=f.read_text('utf-8') if f.exists() else ''; lines=t.splitlines(keepends=True); out=''.join(l for l in lines if not l.startswith('See deft/main.md') and not l.startswith('Skills: deft/skills/')); f.write_text(out,'utf-8') if f.exists() else None; print('Removed deft entry from AGENTS.md' if out!=t else 'No deft entry found in AGENTS.md')"

  spec:validate:
    desc: Validate that vbrief/specification.vbrief.json exists and is well-formed JSON
    cmds:
      - |
        SPEC_FILE="{{.USER_WORKING_DIR}}/vbrief/specification.vbrief.json"
        if [ ! -f "$SPEC_FILE" ]; then
          echo "✗ vbrief/specification.vbrief.json not found"
          echo "  Create it by running the interview process (see deft/templates/make-spec.md)"
          exit 1
        fi
        if ! python3 -c "import json, sys; json.load(open('$SPEC_FILE'))" 2>/dev/null; then
          echo "✗ vbrief/specification.vbrief.json is not valid JSON"
          exit 1
        fi
        echo "✓ vbrief/specification.vbrief.json is valid"

  spec:render:
    desc: Render vbrief/specification.vbrief.json to SPECIFICATION.md
    deps:
      - spec:validate
    cmds:
      - |
        SPEC_FILE="{{.USER_WORKING_DIR}}/vbrief/specification.vbrief.json"
        OUT_FILE="{{.USER_WORKING_DIR}}/SPECIFICATION.md"
        STATUS=$(python3 -c "import json; d=json.load(open('$SPEC_FILE')); print(d.get('status',''))" 2>/dev/null)
        if [ "$STATUS" != "approved" ]; then
          echo "⚠ specification.vbrief.json status is '$STATUS' (expected 'approved')"
          echo "  Have the user review and set status to 'approved' before rendering."
          exit 1
        fi
        python3 - <<'EOF'
        import json, sys
        with open("$SPEC_FILE") as f:
            spec = json.load(f)
        lines = []
        title = spec.get("title", spec.get("plan", "Specification"))
        lines.append(f"# {title}\n")
        if overview := spec.get("overview") or spec.get("description"):
            lines.append(f"{overview}\n")
        for task in spec.get("tasks", []):
            task_id = task.get("id", "")
            do = task.get("do", task.get("title", ""))
            status = task.get("status", "")
            lines.append(f"## {task_id}: {do}  \`[{status}]\`\n")
            for key in ("narrative", "acceptance", "why"):
                if val := task.get(key):
                    if isinstance(val, list):
                        for item in val:
                            lines.append(f"- {item}")
                        lines.append("")
                    else:
                        lines.append(f"{val}\n")
        with open("$OUT_FILE", "w") as f:
            f.write("\n".join(lines))
        EOF
        echo "✓ Rendered to SPECIFICATION.md"

  stats:
    desc: Show framework statistics
    cmds:
      - uv run python -c "from pathlib import Path; v='{{.VERSION}}'; sep='━'*42; dirs=[('Core files','core'),('Languages','languages'),('Interfaces','interfaces'),('Tools','tools'),('Templates','templates')]; counts=[(n,len(list(Path(d).glob('*.md')))) for n,d in dirs]; total=len([f for f in Path('.').rglob('*.md') if '.git' not in str(f) and 'backup' not in str(f)]); print(f'Deft Framework v{v} Statistics:'); print(sep); [print(f'{n}: {c}') for n,c in counts]; print(f'Total files: {total}'); print(sep)"
